<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Contact — AlphaPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{--accent:#1a4db0;--text:#1a1f2e;--muted:#5a6478;--bg:#f4f6f8;--surface:#fff;--border:#e2e6ea;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;}
.wrap{max-width:680px;margin:0 auto;padding:40px 20px 60px;}
.back{font-size:13px;color:var(--accent);text-decoration:none;display:inline-block;margin-bottom:24px;}
h1{font-family:'Space Grotesk',sans-serif;font-size:26px;margin-bottom:6px;}
.sub{color:var(--muted);font-size:14px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;}
p{margin-bottom:14px;color:var(--text);font-size:15px;}
.email-btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;padding:11px 22px;border-radius:8px;font-weight:500;font-size:14px;}
footer{font-size:12px;color:var(--muted);text-align:center;margin-top:30px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Back to AlphaPulse</a>
  <h1>Contact</h1>
  <div class="sub">Questions, feedback, or a broken link? Reach out.</div>

  <div class="card">
    <p>AlphaPulse is run by one person, so replies may take a little while — but every message gets read.</p>
    <a class="email-btn" href="mailto:citijoy775505@gmail.com">Email citijoy775505@gmail.com</a>
  </div>

  <footer>AlphaPulse · <a href="about.html" style="color:var(--accent)">About</a> · <a href="privacy-policy.html" style="color:var(--accent)">Privacy Policy</a> · <a href="terms.html" style="color:var(--accent)">Terms</a></footer>
</div>
</body>
</html>
