<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AlphaPulse — AI Stock Research Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f8f9fa;--surface:#fff;--s2:#f1f3f5;--s3:#e9ecef;--s4:#dee2e6;
  --border:#e0e4e8;--border2:#c8cfd8;
  --text:#1a1f2e;--muted:#5a6478;--dim:#8c95a6;
  --green:#1a7a3f;--gdim:#eaf5ef;--gbright:#22c55e;
  --red:#c0202f;--rdim:#fdf0f1;--rbright:#ef4444;
  --yellow:#92600a;--ydim:#fef9ee;--ybright:#f59e0b;
  --blue:#1a56b0;--bdim:#eff6ff;--bbright:#3b82f6;
  --purple:#6d28d9;--pdim:#f5f3ff;--pbright:#8b5cf6;
  --orange:#c2410c;--odim:#fff7ed;
  --accent:#1a56b0;
  --fd:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
  --r:6px;--rl:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:13px;line-height:1.6;}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:14px;height:54px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.logo{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap;display:flex;align-items:center;gap:6px;}
.logo-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.04em;}
.nav-links{display:flex;gap:2px;}
.nl{padding:6px 12px;border-radius:var(--r);border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--fb);transition:all .12s;}
.nl:hover{background:var(--s2);color:var(--text);}
.nl.active{background:var(--bdim);color:var(--accent);font-weight:500;}
.search-wrap{position:relative;width:300px;margin-left:auto;}
.search-wrap input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:7px 16px 7px 36px;color:var(--text);font-size:13px;outline:none;transition:all .15s;font-family:var(--fb);}
.search-wrap input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(26,86,176,.1);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none;}
.dropdown{position:absolute;top:calc(100%+6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:0 8px 30px rgba(0,0,0,.12);z-index:300;display:none;max-height:360px;overflow-y:auto;}
.dropdown.open{display:block;}
.dd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--s2);transition:background .1s;}
.dd-item:hover{background:var(--s2);}
.dd-sym{font-family:var(--fd);font-weight:700;font-size:13px;color:var(--accent);min-width:56px;}
.dd-name{font-size:12px;color:var(--muted);flex:1;}
.dd-sec{font-size:10px;color:var(--dim);background:var(--s3);padding:2px 6px;border-radius:10px;white-space:nowrap;}

/* ── TICKER BAR ── */
.ticker-bar{background:var(--text);color:#fff;padding:6px 20px;display:flex;gap:20px;overflow:hidden;font-size:11px;}
.tb-item{display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tb-sym{font-weight:600;}
.tb-chg{font-weight:600;}
.tb-up{color:#4ade80;}
.tb-dn{color:#f87171;}

/* ── LAYOUT ── */
.app-layout{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 88px);}
.content-area{padding:20px;border-right:1px solid var(--border);}
.sidebar-area{padding:16px;overflow-y:auto;}

/* ── PAGES ── */
.page{display:none;}
.page.active{display:block;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:14px;}
.card-title{font-family:var(--fd);font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title span{font-size:11px;color:var(--muted);font-family:var(--fb);font-weight:400;}

/* ── ALPHA PICKS (Seeking Alpha style) ── */
.picks-header{background:linear-gradient(135deg,#0f2a5e 0%,#1a4090 50%,#0f3575 100%);border-radius:var(--rl);padding:24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;}
.picks-header::after{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05);}
.picks-label{font-size:11px;font-weight:600;letter-spacing:.08em;color:rgba(255,255,255,.7);margin-bottom:6px;}
.picks-title{font-family:var(--fd);font-size:22px;font-weight:700;margin-bottom:6px;}
.picks-sub{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:16px;}
.picks-stat-row{display:flex;gap:20px;flex-wrap:wrap;}
.picks-stat{text-align:center;}
.picks-stat-val{font-family:var(--fd);font-size:20px;font-weight:700;color:#4ade80;}
.picks-stat-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;}
.picks-badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:500;margin-top:12px;}

/* ── QUANT GRADES (Seeking Alpha style) ── */
.grade-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
.grade-box{border-radius:var(--r);padding:12px 8px;text-align:center;border:1px solid var(--border);}
.gb-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;}
.gb-grade{font-family:var(--fd);font-size:20px;font-weight:700;}
.grade-A-plus,.grade-A{color:var(--green);background:var(--gdim);}
.grade-B-plus,.grade-B{color:#1a7a6a;background:#eafaf5;}
.grade-C-plus,.grade-C{color:var(--yellow);background:var(--ydim);}
.grade-D-plus,.grade-D{color:var(--orange);background:var(--odim);}
.grade-F{color:var(--red);background:var(--rdim);}

/* ── FACTOR SCORES ── */
.factor-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--s2);}
.factor-row:last-child{border-bottom:none;margin-bottom:0;}
.factor-name{font-size:12px;font-weight:500;min-width:130px;}
.factor-bar-bg{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden;}
.factor-fill{height:100%;border-radius:4px;}
.fb-A{background:linear-gradient(90deg,#16a34a,#22c55e);}
.fb-B{background:linear-gradient(90deg,#0d9488,#14b8a6);}
.fb-C{background:linear-gradient(90deg,#d97706,#f59e0b);}
.fb-D{background:linear-gradient(90deg,#ea580c,#f97316);}
.fb-F{background:linear-gradient(90deg,#dc2626,#ef4444);}
.factor-grade{font-family:var(--fd);font-size:14px;font-weight:700;min-width:28px;text-align:center;}
.factor-score{font-size:12px;color:var(--muted);min-width:38px;text-align:right;}

/* ── STOCK HEADER ── */
.stock-topbar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.st-ticker{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--text);}
.st-name{font-size:13px;color:var(--muted);margin-bottom:4px;}
.st-price{font-size:22px;font-weight:600;font-family:var(--fd);}
.st-chg{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:500;padding:3px 10px;border-radius:20px;margin-left:8px;}
.chg-up{background:var(--gdim);color:var(--green);}
.chg-dn{background:var(--rdim);color:var(--red);}

/* ── ANALYST RATING BOX ── */
.rating-summary{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;padding:16px;background:var(--s2);border-radius:var(--rl);margin-bottom:14px;}
.rs-big{text-align:center;}
.rs-rating{font-family:var(--fd);font-size:14px;font-weight:700;padding:10px 16px;border-radius:var(--rl);margin-bottom:6px;}
.r-SB{background:var(--gdim);color:var(--green);border:2px solid var(--green);}
.r-B{background:#eaf5ef;color:#1a7a3f;}
.r-H{background:var(--ydim);color:var(--yellow);}
.r-S{background:var(--odim);color:var(--orange);}
.r-SS{background:var(--rdim);color:var(--red);border:2px solid var(--red);}
.rs-count{font-size:11px;color:var(--muted);}
.rating-bars{}
.rb-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.rb-lbl{font-size:11px;color:var(--muted);min-width:76px;}
.rb-bg{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.rb-fill{height:100%;border-radius:3px;}
.rb-ct{font-size:11px;color:var(--dim);min-width:18px;text-align:right;}

/* ── SA-STYLE TABS ── */
.sa-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto;}
.sa-tab{padding:10px 16px;border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--fb);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .12s;}
.sa-tab:hover{color:var(--text);}
.sa-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}

/* ── NEWS / ARTICLES ── */
.article-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--s2);}
.article-item:last-child{border-bottom:none;}
.art-icon{width:42px;height:42px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--s2);}
.art-body{}
.art-source{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.04em;margin-bottom:2px;}
.art-headline{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:4px;}
.art-meta{display:flex;align-items:center;gap:8px;}
.art-time{font-size:11px;color:var(--dim);}
.sentiment-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
.sp-bull{background:var(--gdim);color:var(--green);}
.sp-bear{background:var(--rdim);color:var(--red);}
.sp-neut{background:var(--ydim);color:var(--yellow);}
.impact-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
.ip-high{background:#fdf2f8;color:#9d174d;}
.ip-med{background:var(--ydim);color:var(--yellow);}
.ip-low{background:var(--bdim);color:var(--blue);}

/* ── STATS TABLE (Seeking Alpha style) ── */
.stats-section{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.stat-block{padding:10px 14px;border-bottom:1px solid var(--border);}
.stat-block:nth-child(odd){border-right:1px solid var(--border);background:var(--surface);}
.stat-block:nth-child(even){background:var(--s2);}
.sb-label{font-size:11px;color:var(--dim);margin-bottom:2px;}
.sb-val{font-size:13px;font-weight:600;color:var(--text);}
.sb-cmp{font-size:10px;color:var(--muted);margin-top:1px;}

/* ── EARNINGS CHART ── */
.chart-wrap{height:180px;position:relative;}

/* ── DIVIDEND ── */
.div-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.div-stat{background:var(--s2);border-radius:var(--r);padding:12px;text-align:center;}
.div-val{font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:2px;}
.div-lbl{font-size:11px;color:var(--muted);}

/* ── PICKS CARDS ── */
.pick-card{display:flex;gap:14px;align-items:flex-start;padding:16px;border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;background:var(--surface);cursor:pointer;transition:all .15s;}
.pick-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(26,86,176,.08);}
.pick-badge{background:linear-gradient(135deg,#0f2a5e,#1a56b0);color:#fff;border-radius:var(--r);padding:10px;text-align:center;min-width:60px;}
.pb-sym{font-family:var(--fd);font-size:15px;font-weight:700;}
.pb-since{font-size:9px;opacity:.8;margin-top:2px;}
.pick-body{flex:1;}
.pick-name{font-weight:500;margin-bottom:3px;}
.pick-reason{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.pick-perf{display:flex;gap:10px;flex-wrap:wrap;}
.pp-stat{text-align:center;background:var(--s2);border-radius:var(--r);padding:6px 10px;}
.pp-val{font-family:var(--fd);font-size:14px;font-weight:700;}
.pp-lbl{font-size:10px;color:var(--muted);}

/* ── HOMEPAGE SECTIONS ── */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.hg-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;cursor:pointer;transition:all .15s;}
.hg-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(26,86,176,.07);}
.hg-label{font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--dim);margin-bottom:4px;}
.hg-ticker{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:1px;}
.hg-name{font-size:11px;color:var(--muted);margin-bottom:8px;}
.hg-pct-row{display:flex;gap:4px;margin-bottom:6px;}
.hg-pct{flex:1;padding:6px 4px;border-radius:4px;text-align:center;font-size:11px;font-weight:700;}
.hgp-buy{background:var(--gdim);color:var(--green);}
.hgp-hold{background:var(--ydim);color:var(--yellow);}
.hgp-sell{background:var(--rdim);color:var(--red);}
.hgp-short{background:var(--pdim);color:var(--purple);}
.hg-headline{font-size:11px;color:var(--muted);line-height:1.45;}

/* ── SIDEBAR ── */
.sb-widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:12px;}
.sbw-title{font-family:var(--fd);font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);}
.wl-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--s2);cursor:pointer;}
.wl-item:last-child{border-bottom:none;}
.wl-item:hover .wl-sym{color:var(--accent);}
.wl-sym{font-family:var(--fd);font-weight:700;font-size:13px;transition:color .12s;}
.wl-name{font-size:11px;color:var(--muted);}
.wl-sig{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.ws-BUY{background:var(--gdim);color:var(--green);}
.ws-HOLD{background:var(--ydim);color:var(--yellow);}
.ws-SELL{background:var(--rdim);color:var(--red);}
.ws-SHORT{background:var(--pdim);color:var(--purple);}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--fb);font-size:13px;font-weight:500;transition:all .12s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#143f8a;}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--s3);}
.btn-sm{padding:5px 12px;font-size:12px;}

/* ── LOADING ── */
.loading{text-align:center;padding:48px 20px;color:var(--muted);}
.spinner{width:28px;height:28px;border:2px solid var(--s3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px;color:var(--dim);}
.section-label{font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;}
.disclaimer{font-size:11px;color:var(--dim);background:var(--s2);border-radius:var(--r);padding:10px 12px;margin-top:12px;line-height:1.6;border:1px solid var(--border);}
.reasoning-box{background:var(--bdim);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px;}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:10px;margin:2px;font-weight:500;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px;}
</style>
</head>
<body>

<!-- TOP NAV -->
<header class="topbar">
  <div class="logo">
    <span>AlphaPulse</span>
    <span class="logo-badge">AI PRO</span>
  </div>
  <nav class="nav-links">
    <button class="nl active" onclick="showPage('home',this)">Markets</button>
    <button class="nl" onclick="showPage('picks',this)">Alpha Picks</button>
    <button class="nl" onclick="showPage('screener',this)">Screener</button>
    <button class="nl" onclick="showPage('portfolio',this)">Portfolio</button>
  </nav>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Search stocks, ETFs, crypto…" autocomplete="off"/>
    <div class="dropdown" id="searchDropdown"></div>
  </div>
</header>

<!-- TICKER BAR -->
<div class="ticker-bar" id="tickerBar">
  <div class="tb-item"><span class="tb-sym">SPY</span><span class="tb-chg tb-up">Loading…</span></div>
</div>

<!-- APP LAYOUT -->
<div class="app-layout">
<div class="content-area" id="mainContent">
  <div class="loading"><div class="spinner"></div>Loading markets…</div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar-area">
  <div class="sb-widget">
    <div class="sbw-title">📋 My Watchlist</div>
    <div style="display:flex;gap:6px;margin-bottom:8px;">
      <input id="wlInput" type="text" placeholder="Add ticker…" style="flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;outline:none;font-family:var(--fb);"/>
      <button class="btn btn-primary btn-sm" onclick="addToWatchlist(document.getElementById('wlInput').value.trim().toUpperCase())">+</button>
    </div>
    <div id="watchlistEl"></div>
  </div>

  <div class="sb-widget">
    <div class="sbw-title">🔥 Trending Now</div>
    <div id="trendingEl"><div style="font-size:12px;color:var(--dim)">Loading…</div></div>
  </div>

  <div class="sb-widget">
    <div class="sbw-title">📊 Sector Performance</div>
    <div id="sectorEl"></div>
  </div>
</aside>
</div>

// CLAUDE API
// ══════════════════════════════════════════
async function callClaude(prompt,maxT=1600){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxT,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  const raw=(d.content||[]).map(b=>b.text||'').join('');
  return JSON.parse(raw.replace(/```json[\s\S]*?```|```/g,'').trim());
}

function gradeClass(g){
  if(!g)return 'grade-C';
  if(g==='A+'||g==='A')return `grade-A${g==='A+'?'-plus':''}`;
  if(g==='B+'||g==='B')return `grade-B${g==='B+'?'-plus':''}`;
  if(g==='C+'||g==='C')return `grade-C${g==='C+'?'-plus':''}`;
  if(g==='D+'||g==='D')return `grade-D${g==='D+'?'-plus':''}`;
  return 'grade-F';
}
function barClass(g){
  if(!g)return 'fb-C';
  if(g.startsWith('A'))return 'fb-A';
  if(g.startsWith('B'))return 'fb-B';
  if(g.startsWith('C'))return 'fb-C';
  if(g.startsWith('D'))return 'fb-D';
  return 'fb-F';
}
function scoreToWidth(g){const map={'A+':96,'A':88,'B+':78,'B':70,'C+':60,'C':50,'D+':38,'D':28,'F':12};return map[g]||50;}

    }
  },80);
}

function switchSATab(btn,showId,tabsId){
  document.getElementById(tabsId).querySelectorAll('.sa-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`[id^="sat_"]`).forEach(e=>{if(e.id.includes(chartId=tabsId.replace('satabs_','')))e.style.display='none';});
  // More targeted:
  const prefix=showId.split('_').slice(0,-1).join('_').replace('sat_overview','sat').replace('sat_signals','sat').replace('sat_chart','sat').replace('sat_earnings','sat').replace('sat_news','sat').replace('sat_risk','sat');
  const suffix=showId.split('_').pop();
  document.querySelectorAll(`[id$="_${suffix}"]`).forEach(e=>{if(e.id.startsWith('sat_'))e.style.display='none';});
  document.getElementById(showId).style.display='block';
}

      <div style="font-family:var(--fd);font-weight:700;color:var(--green);min-width:48px;text-align:right">${p.return}</div>
      <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bdim);color:var(--blue)">${p.still}</span>
    </div>`).join('');

  el.innerHTML=`
    <div class="picks-header">
      <div class="picks-label">⚡ ALPHAPULSE PICKS</div>
      <div class="picks-title">High-Conviction AI Stock Picks</div>
      <div class="picks-sub">2 new picks every month. AI + fundamental + quant analysis combined.</div>
      <div class="picks-stat-row">
        <div class="picks-stat"><div class="picks-stat-val">${tr.winRate}</div><div class="picks-stat-lbl">Win Rate</div></div>
        <div class="picks-stat"><div class="picks-stat-val">${tr.avgReturn}</div><div class="picks-stat-lbl">Avg Return</div></div>
        <div class="picks-stat"><div class="picks-stat-val">${tr.beatingMarket}/${tr.totalPicks}</div><div class="picks-stat-lbl">Beat Market</div></div>
        <div class="picks-stat"><div class="picks-stat-val">Since ${tr.since}</div><div class="picks-stat-lbl">Track Record</div></div>
      </div>
      <span class="picks-badge">🔥 ${d.monthYear} Picks — New this month</span>
    </div>
    <div class="section-label">This month's picks</div>
    ${picks}
    <div class="card" style="margin-top:16px;">
      <div class="card-title">📜 Past Picks Performance</div>
      ${past}
    </div>
    <div class="disclaimer">⚠️ Past performance doesn't guarantee future results. AI-generated. Not financial advice.</div>`;
}

// ══════════════════════════════════════════
// SCREENER
// ══════════════════════════════════════════
async function loadScreener(){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Running AI screener…</div>';
  try{
    const d=await callClaude(`You are a quantitative stock screener. Generate 12 stocks across different categories with full quant data.
Return ONLY valid JSON:
{
  "screened":[
    {
      "ticker":"NVDA","name":"NVIDIA","sector":"Semiconductors","price":"$950","change":"+3.8%","up":true,
      "marketCap":"$2.3T","pe":"45.2","fwdPE":"28.1","epsGrowth":"+122%","revenueGrowth":"+80%",
      "signal":"STRONG BUY","buyPct":84,"sellPct":4,"quantScore":"A+",
      "why":"AI chip dominance, data center growth, margin expansion"
    }
  ]
}
Include 12 diverse tickers (growth, value, dividend, speculative, short opportunities). buyPct+sellPct don't need to sum to 100. Be realistic.`,1400);

    renderScreener(d,el);
  }catch(e){
    el.innerHTML=`<div class="empty" style="color:var(--red)">Failed. <button class="btn btn-ghost btn-sm" onclick="loadScreener()">Retry</button></div>`;
  }
}

function renderScreener(d,el){
  const rows=(d.screened||[]).map(s=>{
    const sigColor=s.signal.includes('STRONG BUY')?'var(--green)':s.signal.includes('BUY')?'#16a34a':s.signal.includes('SELL')?'var(--red)':'var(--yellow)';
    const gc=gradeClass(s.quantScore);
    const chgC=s.up?'var(--green)':'var(--red)';
    return `<tr style="cursor:pointer;transition:background .1s" onclick="selectStock('${s.ticker}','${s.name}')" onmouseover="this.style.background='#f1f3f5'" onmouseout="this.style.background=''">
      <td style="padding:10px 12px;"><span style="font-family:var(--fd);font-weight:700;color:var(--accent)">${s.ticker}</span><br><span style="font-size:11px;color:var(--muted)">${s.name}</span></td>
      <td style="padding:10px 12px;font-size:11px;color:var(--dim)">${s.sector}</td>
      <td style="padding:10px 12px;font-weight:600">${s.price} <span style="color:${chgC};font-size:11px">${s.change}</span></td>
      <td style="padding:10px 12px;font-size:12px">${s.pe}</td>
      <td style="padding:10px 12px;font-size:12px">${s.fwdPE}</td>
      <td style="padding:10px 12px;font-size:12px;color:${s.epsGrowth&&s.epsGrowth.startsWith('+')?'var(--green)':'var(--red)'}">${s.epsGrowth}</td>
      <td style="padding:10px 12px;"><span class="gb-grade ${gc}" style="font-size:12px;padding:2px 8px;border-radius:5px">${s.quantScore}</span></td>
      <td style="padding:10px 12px;"><div style="display:flex;gap:6px;align-items:center;"><div style="flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:50px"><div style="height:100%;width:${s.buyPct}%;background:var(--green);border-radius:3px"></div></div><span style="font-size:11px;color:var(--green);font-weight:600">${s.buyPct}%</span></div></td>
      <td style="padding:10px 12px;"><span style="font-size:11px;font-weight:700;color:${sigColor}">${s.signal}</span></td>
      <td style="padding:10px 12px;font-size:11px;color:var(--muted);max-width:180px">${s.why}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div><div style="font-family:var(--fd);font-size:18px;font-weight:700">AI Stock Screener</div><div style="font-size:13px;color:var(--muted)">Top AI-ranked stocks across all sectors</div></div>
      <button class="btn btn-ghost btn-sm" onclick="loadScreener()">↻ Refresh</button>
    </div>
    <div class="card" style="overflow-x:auto;padding:0;">
      <table style="width:100%;border-collapse:collapse;">
        <thead style="background:var(--s2);">
          <tr>${['Ticker','Sector','Price','P/E','Fwd P/E','EPS Growth','Quant','Buy Signal','Signal','Why'].map(h=>`<th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.04em;white-space:nowrap">${h}</th>`).join('')}</tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="disclaimer">⚠️ AI-generated screener. Not financial advice. Click any row for deep analysis.</div>`;
}

// ══════════════════════════════════════════
// PORTFOLIO
// ══════════════════════════════════════════
let portfolio=JSON.parse(localStorage.getItem('ap_port')||'[]');

async function loadPortfolioPage(){
  const el=document.getElementById('mainContent');
  if(!portfolio.length){
    el.innerHTML=`<div style="padding:20px;">
      <div style="font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:8px">My Portfolio</div>
      <div class="empty">Add tickers to your watchlist and they'll appear here as a portfolio tracker.</div>
    </div>`;
    return;
  }
  el.innerHTML='<div class="loading"><div class="spinner"></div>Analyzing portfolio…</div>';
  try{
    const d=await callClaude(`Analyze this portfolio: ${portfolio.join(', ')}.
Return ONLY valid JSON:
{
  "portfolioScore":number 1-100,
  "grade":"A|B|C|D|F",
  "diversification":"Good|Fair|Poor",
  "bias":"Bullish|Neutral|Bearish",
  "risk":"Low|Moderate|High|Extreme",
  "tickers":[{"ticker":"AAPL","name":"Apple","price":"$212","change":"+0.5%","up":true,"verdict":"BUY","buyPct":65,"sellPct":12,"confidence":74,"riskScore":3,"quant":"A","note":"1 sentence AI take"}]
}
buyPct+sellPct don't have to sum to 100. Include all ${portfolio.length} tickers.`,1200);
    renderPortfolio(d,el);
  }catch(e){
    el.innerHTML=`<div class="empty" style="color:var(--red)">Failed. <button class="btn btn-ghost btn-sm" onclick="loadPortfolioPage()">Retry</button></div>`;
  }
}

function renderPortfolio(d,el){
  const rows=(d.tickers||[]).map(t=>{
    const vc=`ws-${t.verdict}`;
    const rc=t.riskScore<=3?'var(--green)':t.riskScore<=6?'var(--yellow)':'var(--red)';
    const cc=t.up?'var(--green)':'var(--red)';
    const gc=gradeClass(t.quant);
    return `<tr style="cursor:pointer;transition:background .1s" onclick="selectStock('${t.ticker}','${t.name}')" onmouseover="this.style.background='#f1f3f5'" onmouseout="this.style.background=''">
      <td style="padding:10px 12px"><span style="font-family:var(--fd);font-weight:700">${t.ticker}</span><br><span style="font-size:11px;color:var(--muted)">${t.name}</span></td>
      <td style="padding:10px 12px;font-weight:600">${t.price} <span style="color:${cc};font-size:11px">${t.change}</span></td>
      <td style="padding:10px 12px"><span class="wl-sig ${vc}">${t.verdict}</span></td>
      <td style="padding:10px 12px"><div style="display:flex;gap:4px;align-items:center;"><div style="width:60px;height:7px;background:var(--s3);border-radius:3px;overflow:hidden"><div style="height:100%;width:${t.buyPct}%;background:var(--green);border-radius:3px"></div></div><span style="font-size:11px;color:var(--green);font-weight:600">${t.buyPct}%B</span><span style="font-size:11px;color:var(--red);font-weight:600">${t.sellPct}%S</span></div></td>
      <td style="padding:10px 12px"><span class="gb-grade ${gc}" style="font-size:12px;padding:2px 8px;border-radius:5px">${t.quant}</span></td>
      <td style="padding:10px 12px;font-weight:600;color:${rc}">${t.riskScore}/10</td>
      <td style="padding:10px 12px;font-size:11px;color:var(--muted);max-width:180px">${t.note}</td>
      <td style="padding:10px 12px"><button onclick="event.stopPropagation();removeFromWatchlist('${t.ticker}')" style="border:none;background:none;color:var(--dim);cursor:pointer;font-size:13px">✕</button></td>
    </tr>`;
  }).join('');

  const biasC=d.bias==='Bullish'?'var(--green)':d.bias==='Bearish'?'var(--red)':'var(--yellow)';
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div><div style="font-family:var(--fd);font-size:18px;font-weight:700">My Portfolio</div></div>
      <button class="btn btn-ghost btn-sm" onclick="loadPortfolioPage()">↻ Refresh</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      ${[['Portfolio Score',`${d.portfolioScore}/100`,''],['Grade',d.grade,'font-family:var(--fd);font-weight:700'],['Diversification',d.diversification,''],['Bias',d.bias,`color:${biasC}`],['Risk',d.risk,'']].map(([l,v,s])=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;"><div style="font-size:11px;color:var(--dim)">${l}</div><div style="font-size:14px;font-weight:600;${s}">${v}</div></div>`).join('')}
    </div>
    <div class="card" style="padding:0;overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;">
        <thead style="background:var(--s2)"><tr>${['Ticker','Price','Signal','Buy/Sell','Quant','Risk','Note',''].map(h=>`<th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.04em">${h}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="disclaimer">⚠️ AI-generated. Not financial advice.</div>`;
}

// ══════════════════════════════════════════
// WATCHLIST + SIDEBAR
// ══════════════════════════════════════════
function addToWatchlist(t){
  if(!t||watchlist.includes(t))return;
  watchlist.push(t);
  portfolio=watchlist;
  localStorage.setItem('ap_wl',JSON.stringify(watchlist));
  localStorage.setItem('ap_port',JSON.stringify(portfolio));
  renderWatchlist();
  document.getElementById('wlInput').value='';
}
function removeFromWatchlist(t){
  watchlist=watchlist.filter(x=>x!==t);
  portfolio=watchlist;
  localStorage.setItem('ap_wl',JSON.stringify(watchlist));
  localStorage.setItem('ap_port',JSON.stringify(portfolio));
  renderWatchlist();
}
function renderWatchlist(){
  const el=document.getElementById('watchlistEl');
  if(!watchlist.length){el.innerHTML='<div style="font-size:12px;color:var(--dim)">No tickers yet</div>';return;}
  const find=t=>STOCKS.find(s=>s.t===t);
  el.innerHTML=watchlist.map(t=>{
    const sig=signals[t];const s=find(t);
    const vc=sig?`ws-${sig.verdict}`:'ws-HOLD';
    const vt=sig?sig.verdict:'—';
    return `<div class="wl-item" onclick="selectStock('${t}','${s?s.n:t}')">
      <div><div class="wl-sym">${t}</div><div class="wl-name">${s?s.s:''}</div></div>
      <div style="display:flex;align-items:center;gap:6px;"><span class="wl-sig ${vc}">${vt}</span><button onclick="event.stopPropagation();removeFromWatchlist('${t}')" style="border:none;background:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px">✕</button></div>
    </div>`;
  }).join('');
}

function renderTrending(trending){
  document.getElementById('trendingEl').innerHTML=trending.map(t=>{
    const c=t.up?'var(--green)':'var(--red)';
    return `<div class="wl-item" onclick="selectStock('${t.ticker}','${t.ticker}')">
      <div><div class="wl-sym">${t.ticker}</div><div class="wl-name" style="font-size:11px">${t.reason}</div></div>
      <span style="color:${c};font-size:12px;font-weight:600">${t.chg}</span>
    </div>`;
  }).join('');
}

function renderSectors(sectors){
  document.getElementById('sectorEl').innerHTML=sectors.map(s=>{
    const c=s.signal==='Bullish'?'var(--green)':s.signal==='Bearish'?'var(--red)':'var(--yellow)';
    return `<div style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;"><span style="color:var(--text)">${s.name}</span><span style="color:${c};font-weight:600">${s.signal}</span></div>
      <div style="height:5px;background:var(--s3);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${s.score}%;background:${c};border-radius:3px;"></div></div>
    </div>`;
  }).join('');
}

document.getElementById('wlInput').addEventListener('keydown',e=>{if(e.key==='Enter')addToWatchlist(document.getElementById('wlInput').value.trim().toUpperCase());});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderWatchlist();
loadTickerBar();
loadHomepage();
</script>
